<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Feedback Form</title>
    <link rel="stylesheet" href="./css/common.css" />
    <link rel="stylesheet" href="./css/02-form.css" />
</head>

<body>
    <main class="container">
        <p><a class="link" href="./index.html">⬅ Ana sayfa</a></p>

        <form class="feedback-form" autocomplete="off">
            <label class="label">
                Email
                <input class="input" type="email" name="email" autofocus />
            </label>

            <label class="label">
                Message
                <textarea class="textarea" name="message" rows="8"></textarea>
            </label>

            <button class="btn" type="submit">Submit</button>
        </form>
    </main>

    <script type="module" src="./js/02-form.js"></script>
</body>

</html>
